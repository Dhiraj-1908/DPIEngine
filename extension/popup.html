<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0f1e;
        --surface: #111827;
        --border: #1e293b;
        --text: #e2e8f0;
        --muted: #475569;
        --accent: #10b981;
        --red: #ef4444;
      }
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --surface: #f1f5f9;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #94a3b8;
        --accent: #059669;
        --red: #dc2626;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 5px var(--accent);
      animation: pulse 2s infinite;
    }

    .dot.off {
      background: var(--muted);
      box-shadow: none;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .live-text {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .live-text.off { color: var(--muted); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
    }

    .stat + .stat { border-top: 1px solid var(--border); }

    .stat-label {
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .stat-val {
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .stat-val.red  { color: var(--red); }
    .stat-val.blue { color: #60a5fa; }

    .btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">⚡ DPI Engine</div>
    <div class="live-pill">
      <div class="dot" id="dot"></div>
      <span class="live-text" id="liveText">LIVE</span>
    </div>
  </div>

  <div class="card">
    <div class="stat">
      <span class="stat-label">TOTAL</span>
      <span class="stat-val" id="total">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">FORWARDED</span>
      <span class="stat-val blue" id="forwarded">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">BLOCKED</span>
      <span class="stat-val red" id="blocked">—</span>
    </div>
  </div>

  <button class="btn" id="openBtn">OPEN DASHBOARD →</button>

  <script src="popup.js"></script>
</body>
</html>
